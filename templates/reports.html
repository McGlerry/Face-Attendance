<!-- MultipleFiles/reports.html -->
{% extends "base.html" %}

{% block title %}Reports - Attendance System{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2><i class="fas fa-chart-bar me-2"></i>Attendance Reports</h2>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header">
        <h5><i class="fas fa-filter me-2"></i>Filter Report</h5>
    </div>
    <div class="card-body">
        <form id="reportForm">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="start_date" class="form-label">Start Date</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="end_date" class="form-label">End Date</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="class_id" class="form-label">Class</label>
                    <select class="form-select" id="class_id" name="class_id">
                        <option value="all">All Classes</option>
                        {% for class in classes %}
                        <option value="{{ class.class_id }}">{{ class.class_name }} ({{ class.class_code }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search me-2"></i>Generate Report
                </button>
                <div>
                    <button type="button" id="exportCSV" class="btn btn-success me-2" disabled>
                        <i class="fas fa-file-csv me-2"></i>Export CSV
                    </button>
                    <button type="button" id="exportDOCX" class="btn btn-info me-2" disabled>
                        <i class="fas fa-file-word me-2"></i>Export DOCX
                    </button>
                    <button type="button" id="exportPDF" class="btn btn-danger" disabled>
                        <i class="fas fa-file-pdf me-2"></i>Export PDF
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-table me-2"></i>Report Results</h5>
    </div>
    <div class="card-body" id="reportResults">
        <div class="text-center py-4">
            <i class="fas fa-info-circle fa-2x text-muted mb-3"></i>
            <h6>Generate a report to see results here.</h6>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- External JS handles all functionality -->
<script src="{{ url_for('static', filename='js/reports.js') }}"></script>
{% endblock %}
